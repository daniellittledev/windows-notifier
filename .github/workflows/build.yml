name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore WindowsNotifier.sln

      - name: Build
        run: dotnet build WindowsNotifier.sln --configuration Release --no-restore
